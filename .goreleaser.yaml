project_name: skypaw

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/skypaw
    binary: skypaw
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -w -s
      - -X 'github.com/zenpaw-labs/skypaw/cmd.semVersion=v1.0.0'

archives:
  - format: binary
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"